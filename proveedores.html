<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Quiero Moringa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #7cfc00; --sidebar-bg: #1e293b; --light-bg: #f8fafc; --text-main: #334155; --white: #ffffff; --border: #e2e8f0; --dark-bg: #0f172a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 100px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 10px; }
        .sidebar-brand { color: var(--primary); font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 20px; text-transform: uppercase; line-height: 1.2; }
        .sidebar-item { width: 80px; height: 75px; color: #94a3b8; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; text-decoration: none; font-size: 11px; font-weight: 500; text-align: center; gap: 5px; }
        .sidebar-item:hover, .sidebar-item.active { background-color: var(--primary); color: var(--dark-bg); font-weight: 600; }
        .sidebar-item svg { width: 24px; height: 24px; fill: currentColor; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 25px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header h1 { font-size: 24px; color: var(--dark-bg); }
        .content-box { display: flex; gap: 20px; height: calc(100% - 75px); }
        .list-box { flex: 2; background: var(--white); border-radius: 12px; padding: 20px; border: 1px solid var(--border); overflow-y: auto; }
        .form-box { flex: 1; background: var(--white); border-radius: 12px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; font-weight: 600; }
        .form-group input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        .btn-save { background: var(--dark-bg); color: var(--white); border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">Quiero<br>Moringa</div>
        <a href="index.html" class="sidebar-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Ventas
        </a>
        <a href="stock.html" class="sidebar-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            Stock
        </a>
        <a href="proveedores.html" class="sidebar-item active">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            Proveedores
        </a>
        <a href="usuarios.html" class="sidebar-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Usuarios
        </a>
        <a href="reportes.html" class="sidebar-item">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H5v-2h4V7h2v4h4v2z"/></svg>
            Reportes/Caja
        </a>
    </nav>

    <main class="main-container">
        <header class="header">
            <h1>Gestión de Proveedores</h1>
        </header>
        <div class="content-box">
            <section class="list-box">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Teléfono</th><th>Email</th></tr>
                    </thead>
                    <tbody id="tablaProv"></tbody>
                </table>
            </section>
            <section class="form-box">
                <h3>Añadir Proveedor</h3>
                <div class="form-group"><label>Nombre Comercial</label><input type="text" id="provNombre"></div>
                <div class="form-group"><label>Teléfono de Contacto</label><input type="text" id="provTelef"></div>
                <div class="form-group"><label>Correo Electrónico</label><input type="email" id="provEmail"></div>
                <button class="btn-save" onclick="guardarProveedor()">Registrar</button>
            </section>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://ibjllxtwhihrtgfbammi.supabase.co"; const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliamxseHR3aGlocnRnZmJhbW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjc5NjMsImV4cCI6MjA5ODk0Mzk2M30.o-M7x-phvhhKmfG1aVURGUWTz2w_hdtNZ6oSM8sub1Q";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener("DOMContentLoaded", cargarProveedores);

        async function cargarProveedores() {
            const { data } = await db.from('proveedores').select('*').order('nombre', {ascending:true});
            const tbody = document.getElementById('tablaProv'); tbody.innerHTML = '';
            if(data) {
                data.forEach(p => {
                    tbody.innerHTML += `<tr><td><b>${p.nombre}</b></td><td>${p.telefono || '-'}</td><td>${p.email || '-'}</td></tr>`;
                });
            }
        }

        async function guardarProveedor() {
            const nombre = document.getElementById('provNombre').value;
            const telefono = document.getElementById('provTelef').value;
            const email = document.getElementById('provEmail').value;
            if(!nombre) return alert('El nombre es obligatorio.');

            await db.from('proveedores').insert([{ nombre, telefono, email }]);
            document.getElementById('provNombre').value = '';
            document.getElementById('provTelef').value = '';
            document.getElementById('provEmail').value = '';
            cargarProveedores();
        }
    </script>
</body>
</html>
